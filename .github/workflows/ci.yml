name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npm run package -- --out mermaid-markdown-server.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-markdown-server-vsix
          path: mermaid-markdown-server.vsix
          if-no-files-found: error
